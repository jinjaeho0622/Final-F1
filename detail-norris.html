<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Lando Norris — F1</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;cursor:default;}

/* 뒤로가기 — 삼각형 */
#back{
  position:fixed;top:30px;left:36px;z-index:9999;
  width:46px;height:46px;background:none;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:.7;transition:opacity .25s,transform .25s;
}
#back:hover{opacity:1;transform:translateX(-4px);}
#back::before{
  content:'';width:0;height:0;
  border-top:13px solid transparent;border-bottom:13px solid transparent;
  border-right:20px solid #fff;
}

.stage{position:fixed;inset:0;overflow:hidden;}
/* 모든 이미지 화면 꽉 채움 */
.stage img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  display:block;
}

/* STAGE 1 — 국기 */
#s1{z-index:30;}
#s1 img{opacity:0;transform:scale(1.08);}
#s1.show img{animation:in1 .8s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes in1{to{opacity:1;transform:scale(1);}}
#s1.leave{animation:fade .45s ease forwards;}

/* STAGE 2 — 팀 로고 */
#s2{z-index:20;opacity:0;}
#s2 img{opacity:0;transform:scale(1.04);}
#s2.show{opacity:1;}
#s2.show img{animation:in2 .8s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes in2{to{opacity:1;transform:scale(1);}}
#s2.leave{animation:fade .45s ease forwards;}

/* STAGE 3 — 소개 */
#s3{z-index:10;opacity:0;}
#s3 img{opacity:0;transform:scale(1.04);}
#s3.show{opacity:1;}
#s3.show img{animation:in3 .9s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes in3{to{opacity:1;transform:scale(1);}}

@keyframes fade{to{opacity:0;}}
@media (prefers-reduced-motion: reduce){
  #s1 img,#s2,#s2 img,#s3,#s3 img{animation-duration:.01ms!important;}
}
</style>
</head>
<body>

<button id="back" onclick="goBack()" aria-label="back"></button>

<div class="stage" id="s1"><img src="Drivers/Hamilton, Norris gonfalon.png" alt=""/></div>
<div class="stage" id="s2"><img src="Drivers/Norris logo.png" alt=""/></div>
<div class="stage" id="s3"><img src="Drivers/Lando Norris introduce.png" alt="Lando Norris"/></div>

<script>
const s1=document.getElementById('s1'),
      s2=document.getElementById('s2'),
      s3=document.getElementById('s3');

const T_FLAG = 1400, T_LOGO = 1400;
requestAnimationFrame(()=>{ s1.classList.add('show'); });
setTimeout(()=>{ s1.classList.add('leave'); s2.classList.add('show'); }, T_FLAG);
setTimeout(()=>{ s2.classList.add('leave'); s3.classList.add('show'); }, T_FLAG + T_LOGO);

function goBack(){ history.length>1 ? history.back() : location.href='index.html'; }
window.addEventListener('keydown',e=>{ if(e.key==='Escape') goBack(); });
</script>
</body>
</html>
